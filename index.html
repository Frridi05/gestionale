<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymCare — Gestionale</title>
<meta name="theme-color" content="#0B0E14">
<meta name="description" content="Gestionale GymCare: clienti, interventi, preventivi, fatture, spese e magazzino.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymCare">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/js"></script>
<style>
:root{
  --bg:#0B0E14;
  --panel:#12161F;
  --panel-2:#181D28;
  --border:#232A38;
  --text:#E7EAF0;
  --text-dim:#8A93A6;
  --text-faint:#5B6577;
  --accent:#0066FF;
  --accent-soft:rgba(0,102,255,0.14);
  --ok:#22C55E;
  --ok-soft:rgba(34,197,94,0.14);
  --warn:#F5A623;
  --warn-soft:rgba(245,166,35,0.14);
  --danger:#EF4444;
  --danger-soft:rgba(239,68,68,0.14);
  --radius:10px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh;}
#app{display:flex;min-height:100vh;}

/* Login */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:30px 26px;}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:22px;}
.login-brand .brand-mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#003C99);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;}
.login-brand .name{font-weight:700;font-size:17px;}
.login-brand .sub{font-size:12px;color:var(--text-faint);}
.login-error{background:var(--danger-soft);color:#FCA5A5;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:14px;display:none;}
.login-error.show{display:block;}

/* Sidebar */
.sidebar{width:230px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px 8px;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#003C99);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;letter-spacing:-0.5px;color:#fff;flex-shrink:0;}
.brand-text .name{font-weight:700;font-size:15px;letter-spacing:-0.2px;}
.brand-text .sub{font-size:11px;color:var(--text-faint);}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;color:var(--text-dim);cursor:pointer;font-size:13.5px;font-weight:500;border:1px solid transparent;transition:background .12s,color .12s;user-select:none;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav-item:hover{background:var(--panel-2);color:var(--text);}
.nav-item.active{background:var(--accent-soft);color:#fff;border-color:rgba(0,102,255,0.35);}
.nav-item.active svg{opacity:1;}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;color:var(--text-dim);padding:0 4px;}
.user-chip .email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;}
.logout-btn{background:transparent;border:none;color:var(--text-faint);cursor:pointer;font-size:11px;text-decoration:underline;padding:0;}
.sync-note{font-size:10px;color:var(--text-faint);margin-top:8px;padding:0 4px;}

/* Main */
.main{flex:1;min-width:0;padding:26px 34px 60px 34px;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:21px;font-weight:700;letter-spacing:-0.3px;}
.page-sub{color:var(--text-dim);font-size:13px;margin-top:3px;}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:filter .12s, transform .05s;font-family:var(--font);}
.btn:hover{filter:brightness(1.12);}
.btn:active{transform:scale(.97);}
.btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);}
.btn.ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:7px 11px;font-size:12.5px;}
.btn.small{padding:6px 10px;font-size:12px;}
.btn.full{width:100%;justify-content:center;}
.btn svg{width:15px;height:15px;}
.btn:disabled{opacity:.6;cursor:default;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:17px 18px;}
.card .k{font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.card .v{font-size:24px;font-weight:700;margin-top:8px;letter-spacing:-0.5px;}
.card .delta{font-size:11.5px;margin-top:6px;color:var(--text-faint);}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-head h3{margin:0;font-size:14.5px;font-weight:700;}
.panel-body{padding:6px 0;}
.panel-body.pad{padding:16px 18px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--text-faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:10px 18px;border-bottom:1px solid var(--border);}
td{padding:12px 18px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--panel-2);}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.icon-btn:hover{color:var(--text);border-color:var(--text-faint);}
.icon-btn svg{width:14px;height:14px;}
.empty{padding:44px 18px;text-align:center;color:var(--text-faint);font-size:13px;}
.empty .big{font-size:30px;margin-bottom:8px;opacity:.5;}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge.ok{background:var(--ok-soft);color:#4ADE80;}
.badge.warn{background:var(--warn-soft);color:#FBBF24;}
.badge.danger{background:var(--danger-soft);color:#FCA5A5;}
.badge.neutral{background:var(--panel-2);color:var(--text-dim);border:1px solid var(--border);}
.badge.info{background:var(--accent-soft);color:#7EA8FF;}

.filters{display:flex;gap:8px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--border);}
.input,.select,textarea{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 11px;font-size:13px;font-family:var(--font);outline:none;}
.input:focus,.select:focus,textarea:focus{border-color:var(--accent);}
.form-row .input,.form-row .select,.form-row textarea{width:100%;}

.overlay{position:fixed;inset:0;background:rgba(4,6,10,0.6);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(2px);}
.overlay.show{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;padding:22px 22px 20px 22px;}
.modal h2{margin:0 0 4px 0;font-size:17px;}
.modal .modal-sub{color:var(--text-dim);font-size:12.5px;margin-bottom:18px;}
.form-row{margin-bottom:13px;}
.form-row label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);}

.voci-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
.voci-table th{font-size:10.5px;padding:4px 6px;}
.voci-table td{padding:4px 6px;border:none;}
.voci-table input{width:100%;}
.voci-total{display:flex;justify-content:flex-end;gap:16px;padding:10px 4px 0 4px;font-size:14px;font-weight:700;}

#toast{position:fixed;bottom:22px;right:22px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:9px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;gap:9px;}
#toast.show{display:flex;}
#toast .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;color:var(--text-dim);font-size:13px;}

.chart{display:flex;align-items:flex-end;gap:7px;height:120px;padding:6px 4px 0 4px;}
.chart .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.chart .bar{width:100%;background:linear-gradient(180deg,var(--accent),#003C99);border-radius:4px 4px 0 0;min-height:2px;}
.chart .lbl{font-size:9.5px;color:var(--text-faint);margin-top:6px;}

.mono{font-family:var(--mono);}
.text-dim{color:var(--text-dim);}
.text-right{text-align:right;}
.config-warning{background:var(--warn-soft);color:#FBBF24;border-radius:9px;padding:12px 14px;font-size:12.5px;margin-bottom:16px;line-height:1.5;}

@media(max-width:860px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .2s;z-index:150;}
  .sidebar.open{transform:translateX(0);}
  .main{padding:18px;width:100%;}
  .form-grid{grid-template-columns:1fr;}
  .mobile-topbar{display:flex;}
}
.mobile-topbar{display:none;align-items:center;gap:12px;margin-bottom:16px;}
</style>
</head>
<body>

<div id="loading">Caricamento gestionale…</div>

<div id="login-screen" style="display:none;">
  <div class="login-box">
    <div class="login-brand">
      <div class="brand-mark">BFA</div>
      <div class="name">GymCare</div>
      <div class="sub">Accesso riservato al team</div>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="form-row"><label>Email</label><input class="input" type="email" id="login-email" autocomplete="username"></div>
    <div class="form-row"><label>Password</label><input class="input" type="password" id="login-password" autocomplete="current-password"></div>
    <button class="btn full" id="login-btn" onclick="doLogin()">Accedi</button>
    <div style="text-align:center;margin-top:16px;font-size:11.5px;color:var(--text-faint);">
      Le credenziali vengono create dal titolare.<br>Nessuna registrazione autonoma è consentita.
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">BFA</div>
      <div class="brand-text">
        <div class="name">GymCare</div>
        <div class="sub">Gestionale attività</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">
      <div class="user-chip"><span class="email" id="user-email"></span><button class="logout-btn" onclick="doLogout()">Esci</button></div>
      <div class="sync-note">Dati sincronizzati in tempo reale col team</div>
    </div>
  </aside>

  <main class="main">
    <div class="mobile-topbar">
      <button class="icon-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" style="width:34px;height:34px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <strong>GymCare</strong>
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div id="toast"><span class="dot"></span><span id="toast-msg"></span></div>

<script>
/* ============================================================
   CONFIGURAZIONE SUPABASE — DA COMPILARE
   1. Crea un progetto gratuito su https://com
   2. Vai su Project Settings > API
   3. Copia "Project URL" e "anon public key" qui sotto
   4. Esegui lo script SQL fornito (schema.sql) nell'SQL Editor di Supabase
   5. In Authentication > Providers, disattiva "Allow new users to sign up"
   6. Crea gli account del team in Authentication > Users > Add user
   ============================================================ */
const SUPABASE_URL = 'https://bawsvvpfrhnkpipqhivs.co';
const SUPABASE_ANON_KEY = 'sb_publishable_EdARqXTuVa-5e9hfSJOQtg_KUyVtxEY';

const CONFIGURED = !SUPABASE_URL.startsWith('INSERISCI') && !SUPABASE_ANON_KEY.startsWith('INSERISCI');
  let supabaseClient = null;
if(CONFIGURED){
  supabaseClient = window.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

/* ============ ICONS ============ */
const ICONS = {
  dashboard:'<path d="M3 13h8V3H3v10Zm10 8h8V11h-8v10ZM3 21h8v-6H3v6ZM13 3v6h8V3h-8Z"/>',
  clienti:'<path d="M17 20a5 5 0 0 0-10 0"/><circle cx="12" cy="9" r="4"/>',
  interventi:'<path d="M14.7 6.3a4 4 0 0 1-5.5 5.5L4 17v3h3l5.2-5.2a4 4 0 0 1 5.5-5.5L21 6l-3-3-3.3 3.3Z"/>',
  preventivi:'<path d="M9 12h6M9 16h6M9 8h6M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/>',
  fatture:'<path d="M6 3h9l5 5v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="M9 9h6M9 13h6M9 17h3"/>',
  spese:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1.4 1.3-2.5 3-2.5s3 1.1 3 2.5-1.3 2-3 2.5-3 1.1-3 2.5 1.3 2.5 3 2.5 3-1.1 3-2.5"/>',
  magazzino:'<path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8M12 13v8"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
  trash:'<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  convert:'<path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
};
function icon(name){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`; }

/* ============ STATE ============ */
let DB = { clienti:[], interventi:[], preventivi:[], fatture:[], spese:[], magazzino:[] };
let currentTab = 'dashboard';
const KEYS = ['clienti','interventi','preventivi','fatture','spese','magazzino'];
let realtimeChannels = [];

/* Field maps: [colonna_db, campoJs] */
const FIELD_MAPS = {
  clienti: [['nome','nome'],['citta','citta'],['telefono','telefono'],['indirizzo','indirizzo'],['referente','referente'],['email','email'],['note','note']],
  interventi: [['cliente_id','clienteId'],['data','data'],['tipo','tipo'],['stato','stato'],['descrizione','descrizione'],['costo','costo'],['note','note']],
  preventivi: [['numero','numero'],['cliente_id','clienteId'],['data','data'],['voci','voci'],['stato','stato'],['scadenza','scadenza'],['note','note']],
  fatture: [['numero','numero'],['cliente_id','clienteId'],['data','data'],['voci','voci'],['stato','stato'],['scadenza','scadenza'],['data_pagamento','dataPagamento'],['note','note']],
  spese: [['data','data'],['categoria','categoria'],['descrizione','descrizione'],['importo','importo']],
  magazzino: [['nome','nome'],['quantita','quantita'],['scorta','scorta'],['prezzo','prezzo'],['fornitore','fornitore']],
};
function fromDb(table,row){ const o={id:row.id}; FIELD_MAPS[table].forEach(([db,js])=>{ o[js]=row[db]; }); return o; }
function toDb(table,obj){ const o={}; FIELD_MAPS[table].forEach(([db,js])=>{ o[db]=obj[js]; }); return o; }

async function loadAll(){
  for(const k of KEYS){
    const {data,error} = await from(k).select('*').order('created_at',{ascending:false});
    DB[k] = (error || !data) ? [] : data.map(r=>fromDb(k,r));
    if(error) console.error(k, error.message);
  }
}

function subscribeRealtime(){
  realtimeChannels.forEach(ch=>removeChannel(ch));
  realtimeChannels = KEYS.map(k=>
    channel('sync:'+k)
      .on('postgres_changes', {event:'*', schema:'public', table:k}, async ()=>{
        const {data,error} = await from(k).select('*').order('created_at',{ascending:false});
        if(!error && data){ DB[k] = data.map(r=>fromDb(k,r)); render(); }
      })
      .subscribe()
  );
}

/* ============ HELPERS ============ */
function eur(n){ return (Number(n)||0).toLocaleString('it-IT',{style:'currency',currency:'EUR'}); }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return (s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function clienteName(id){ const c=DB.clienti.find(x=>x.id===id); return c?c.nome:'—'; }
function vociTotale(voci){ return (voci||[]).reduce((s,v)=>s+(Number(v.qta)||0)*(Number(v.prezzo)||0),0); }
function nextNumero(list, prefix, year){
  const yearItems = list.filter(x=>x.numero && x.numero.endsWith('/'+year));
  const n = yearItems.length + 1;
  return `${prefix}${n}/${year}`;
}
function toast(msg, kind){
  const t=document.getElementById('toast'); const dot=t.querySelector('.dot');
  document.getElementById('toast-msg').textContent = msg;
  dot.style.background = kind==='danger' ? 'var(--danger)' : 'var(--ok)';
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
function confirmDelete(msg){ return window.confirm(msg); }

/* ============ AUTH ============ */
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');
  errBox.classList.remove('show');
  if(!email || !password){ errBox.textContent='Inserisci email e password.'; errBox.classList.add('show'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Accesso in corso…';
  const {data,error} = await auth.signInWithPassword({email,password});
  btn.disabled = false; btn.textContent = 'Accedi';
  if(error){
    errBox.textContent = 'Credenziali non valide. Contatta il titolare per un accesso.';
    errBox.classList.add('show');
    return;
  }
  await enterApp(data.session);
}
async function doLogout(){
  await auth.signOut();
  realtimeChannels.forEach(ch=>removeChannel(ch));
  realtimeChannels = [];
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
}
async function enterApp(session){
  document.getElementById('user-email').textContent = session.user.email;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('loading').style.display='flex';
  await loadAll();
  subscribeRealtime();
  renderNav();
  render();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
}

/* ============ NAV ============ */
const TABS = [
  {id:'dashboard', label:'Dashboard', icon:'dashboard'},
  {id:'clienti', label:'Clienti', icon:'clienti'},
  {id:'interventi', label:'Interventi', icon:'interventi'},
  {id:'preventivi', label:'Preventivi', icon:'preventivi'},
  {id:'fatture', label:'Fatture', icon:'fatture'},
  {id:'spese', label:'Spese', icon:'spese'},
  {id:'magazzino', label:'Magazzino', icon:'magazzino'},
];
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = TABS.map(t=>`

function switchTab(id){ currentTab = id; renderNav(); render(); document.getElementById('sidebar').classList.remove('open'); }

/* ============ RENDER ROUTER ============ */
function render(){
  const c = document.getElementById('content');
  if(currentTab==='dashboard') c.innerHTML = renderDashboard();
  else if(currentTab==='clienti') c.innerHTML = renderClienti();
  else if(currentTab==='interventi') c.innerHTML = renderInterventi();
  else if(currentTab==='preventivi') c.innerHTML = renderPreventivi();
  else if(currentTab==='fatture') c.innerHTML = renderFatture();
  else if(currentTab==='spese') c.innerHTML = renderSpese();
  else if(currentTab==='magazzino') c.innerHTML = renderMagazzino();
}

/* ============ DASHBOARD ============ */
function renderDashboard(){
  const year = new Date().getFullYear();
  const fattureAnno = DB.fatture.filter(f=>f.data && f.data.startsWith(String(year)));
  const fatturato = fattureAnno.reduce((s,f)=>s+vociTotale(f.voci),0);
  const daIncassare = DB.fatture.filter(f=>f.stato==='da_pagare');
  const daIncassareTot = daIncassare.reduce((s,f)=>s+vociTotale(f.voci),0);
  const interventiInCorso = DB.interventi.filter(i=>i.stato==='in_corso').length;
  const oggi = todayISO();
  const in7 = new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  const prossimi = DB.interventi.filter(i=>i.data>=oggi && i.data<=in7 && i.stato!=='completato').sort((a,b)=>a.data.localeCompare(b.data));
  const speseAnno = DB.spese.filter(s=>s.data && s.data.startsWith(String(year))).reduce((s,x)=>s+Number(x.importo||0),0);
  const monthly = Array(12).fill(0);
  fattureAnno.forEach(f=>{ const m=new Date(f.data+'T00:00:00').getMonth(); monthly[m]+=vociTotale(f.voci); });
  const max = Math.max(...monthly,1);
  const mesi = ['G','F','M','A','M','G','L','A','S','O','N','D'];
  return `
    <div class="page-header"><div><div class="page-title">Dashboard</div><div class="page-sub">Panoramica ${year}</div></div></div>
    <div class="cards">
      <div class="card"><div class="k">Fatturato ${year}</div><div class="v">${eur(fatturato)}</div><div class="delta">${fattureAnno.length} fatture emesse</div></div>
      <div class="card"><div class="k">Da incassare</div><div class="v" style="color:${daIncassareTot>0?'#FBBF24':'inherit'}">${eur(daIncassareTot)}</div><div class="delta">${daIncassare.length} fatture in attesa</div></div>
      <div class="card"><div class="k">Interventi in corso</div><div class="v">${interventiInCorso}</div><div class="delta">${DB.interventi.length} totali registrati</div></div>
      <div class="card"><div class="k">Spese ${year}</div><div class="v">${eur(speseAnno)}</div><div class="delta">totale costi registrati</div></div>
    </div>
    <div class="panel"><div class="panel-head"><h3>Fatturato mensile</h3></div>
      <div class="panel-body pad"><div class="chart">${monthly.map((v,i)=>`<div class="bar-wrap"><div class="bar" style="height:${Math.max((v/max)*100,2)}%" title="${eur(v)}"></div><div class="lbl">${mesi[i]}</div></div>`).join('')}</div></div>
    </div>
    <div class="panel"><div class="panel-head"><h3>Prossimi 7 giorni</h3></div>
      <div class="panel-body">${prossimi.length? `<table><tbody>${prossimi.map(i=>`<tr><td style="width:110px">${fmtDate(i.data)}</td><td>${esc(clienteName(i.clienteId))}</td><td class="text-dim">${esc(i.tipo)}</td><td>${statoBadge(i.stato)}</td></tr>`).join('')}</tbody></table>` : `<div class="empty">Nessun intervento in programma nei prossimi 7 giorni</div>`}</div>
    </div>`;
}
function statoBadge(stato){
  const map = {
    da_programmare:['neutral','Da programmare'], programmato:['info','Programmato'],
    in_corso:['warn','In corso'], completato:['ok','Completato'],
    bozza:['neutral','Bozza'], inviato:['info','Inviato'], accettato:['ok','Accettato'], rifiutato:['danger','Rifiutato'],
    da_pagare:['warn','Da incassare'], pagata:['ok','Pagata'],
  };
  const [cls,label] = map[stato] || ['neutral',stato];
  return `<span class="badge ${cls}">${label}</span>`;
}
function statoLabel(s){ const el=document.createElement('div'); el.innerHTML=statoBadge(s); return el.textContent; }
function emptyState(what,msg){ return `<div class="empty"><div class="big">—</div>Nessun ${what} presente.<br>${msg}</div>`; }
function clienteOptions(selected){
  if(!DB.clienti.length) return `<option value="">— nessun cliente, aggiungine uno —</option>`;
  return DB.clienti.map(c=>`<option value="${c.id}" ${c.id===selected?'selected':''}>${esc(c.nome)}</option>`).join('');
}

  DB.clienti = DB.clienti.filter(x=>x.id!==id);

}

/* ============ VOCI EDITOR ============ */
let editingVoci = [];
function vociEditorHtml(){
  return `<table class="voci-table"><thead><tr><th style="width:auto">Descrizione</th><th style="width:60px">Qtà</th><th style="width:90px">Prezzo €</th><th style="width:90px" class="text-right">Totale</th><th style="width:28px"></th></tr></thead>
    <tbody id="voci-body">${editingVoci.map((v,idx)=>vociRow(v,idx)).join('')}</tbody></table>
    <button class="btn ghost small" onclick="addVoceRow()">${icon('plus')} Riga</button>
    <div class="voci-total"><span class="text-dim" style="font-weight:400;font-size:12.5px;">Totale</span><span id="voci-total-val">${eur(vociTotale(editingVoci))}</span></div>`;
}
function vociRow(v,idx){
  return `<tr><td><input class="input" value="${esc(v.desc)}" oninput="updateVoce(${idx},'desc',this.value)"></td>
    <td><input class="input" type="number" step="1" value="${v.qta}" oninput="updateVoce(${idx},'qta',this.value)"></td>
    <td><input class="input" type="number" step="0.01" value="${v.prezzo}" oninput="updateVoce(${idx},'prezzo',this.value)"></td>
    <td class="text-right mono" id="voce-tot-${idx}">${eur((v.qta||0)*(v.prezzo||0))}</td>
    <td><button class="icon-btn" onclick="removeVoceRow(${idx})">${icon('x')}</button></td></tr>`;
}
function addVoceRow(){ editingVoci.push({desc:'',qta:1,prezzo:0}); refreshVoci(); }
function removeVoceRow(idx){ editingVoci.splice(idx,1); refreshVoci(); }
function updateVoce(idx,field,val){
  editingVoci[idx][field] = (field==='desc') ? val : Number(val)||0;
  document.getElementById('voce-tot-'+idx).textContent = eur((editingVoci[idx].qta||0)*(editingVoci[idx].prezzo||0));
  document.getElementById('voci-total-val').textContent = eur(vociTotale(editingVoci));
}
function refreshVoci(){
  document.getElementById('voci-body').innerHTML = editingVoci.map((v,idx)=>vociRow(v,idx)).join('');
  document.getElementById('voci-total-val').textContent = eur(vociTotale(editingVoci));
}

    <div class="modal-sub">${f?esc(f.numero):'Numero assegnato al salvataggio'} · Regime forfettario, IVA non esposta</div>
    <div class="form-grid"><div class="form-row"><label>Cliente *</label><select class="select" id="f-cliente">${clienteOptions(f?.clienteId)}</select></div>
      <div class="form-row"><label>Data</label><input class="input" type="date" id="f-data" value="${f?.data||todayISO()}"></div></div>
    <div class="form-row"><label>Voci</label>${vociEditorHtml()}</div>
    <div class="form-grid"><div class="form-row"><label>Stato</label><select class="select" id="f-stato">${[['da_pagare','Da incassare'],['pagata','Pagata']].map(([v,l])=>`<option value="${v}" ${f?.stato===v?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="form-row"><label>Scadenza pagamento</label><input class="input" type="date" id="f-scadenza" value="${f?.scadenza||''}"></div></div>
    <div class="form-row"><label>Note</label><textarea class="input" id="f-note" rows="2">${esc(f?.note)||''}</textarea></div>
    <div class="modal-actions"><button class="btn secondary" onclick="closeModal()">Annulla</button><button class="btn" onclick="saveFattura('${id||''}')">${icon('check')} Salva</button></div>
  `);
}
async function saveFattura(id){
  const clienteId = document.getElementById('f-cliente').value;
  if(!clienteId){ toast('Seleziona o crea prima un cliente','danger'); return; }
  const voci = editingVoci.filter(v=>v.desc.trim()!=='' || v.prezzo>0);
  const obj = { clienteId, data:document.getElementById('f-data').value, voci, stato:document.getElementById('f-stato').value,
    scadenza:document.getElementById('f-scadenza').value || null, note:document.getElementById('f-note').value.trim() };
  if(id){
    const payload = toDb('fatture', obj);
    const {data,error} = await from('fatture').update(payload).eq('id',id).select().single();
    if(error){ toast('Errore salvataggio','danger'); return; }
    Object.assign(DB.fatture.find(x=>x.id===id), fromDb('fatture',data));
  } else {
    const year = new Date(obj.data||todayISO()).getFullYear();
    obj.numero = nextNumero(DB.fatture,'',''+year);
    obj.dataPagamento = null;
    const payload = toDb('fatture', obj);
    const {data,error} = await from('fatture').insert(payload).select().single();
    if(error){ toast('Errore salvataggio','danger'); return; }
    DB.fatture.unshift(fromDb('fatture',data));
  }
  closeModal(); render(); toast('Fattura salvata');
}
async function markPagata(id){
  const payload = { stato:'pagata', data_pagamento: todayISO() };
  const {data,error} = await from('fatture').update(payload).eq('id',id).select().single();
  if(error){ toast('Errore aggiornamento','danger'); return; }
  Object.assign(DB.fatture.find(x=>x.id===id), fromDb('fatture',data));
  render(); toast('Fattura segnata come pagata');
}
async function deleteFattura(id){
  if(!confirmDelete('Eliminare questa fattura?')) return;
  const {error} = await from('fatture').delete().eq('id',id);
  if(error){ toast('Errore eliminazione','danger'); return; }
  DB.fatture = DB.fatture.filter(x=>x.id!==id);
  render(); toast('Fattura eliminata');
}

  return `

      <button class="btn" onclick="openSpesaForm()">${icon('plus')} Nuova spesa</button></div>
    <div class="panel"><div class="panel-body">
      ${list.length? `<table><thead><tr><th>Data</th><th>Categoria</th><th>Descrizione</th><th class="text-right">Importo</th><th></th></tr></thead>
        <tbody>${list.map(s=>`<tr><td>${fmtDate(s.data)}</td><td><span class="badge neutral">${esc(s.categoria)}</span></td><td class="text-dim">${esc(s.descrizione)||'—'}</td><td class="text-right mono">${eur(s.importo)}</td>

async function deleteSpesa(id){

  if(error){ toast('Errore eliminazione','danger'); return; }

/* ============ MODAL ============ */
function showModal(html){ document.getElementById('modal').innerHTML = html; document.getElementById('overlay').classList.add('show'); }
function closeModal(){ document.getElementById('overlay').classList.remove('show'); editingVoci=[]; }
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('login-password')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

/* ============ INIT ============ */
(async function init(){
  if(!CONFIGURED){
    document.getElementById('loading').innerHTML = `<div style="max-width:420px;text-align:center;padding:20px;">
      <div style="font-weight:700;margin-bottom:10px;color:var(--text);">Configurazione mancante</div>
      <div style="font-size:12.5px;line-height:1.6;">Apri il file index.html e inserisci SUPABASE_URL e SUPABASE_ANON_KEY.<br>Vedi le istruzioni fornite (SETUP.md).</div>
    </div>`;
    return;
  }
  document.addEventListener('keydown', e=>{ if(e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin(); });
  const {data:{session}} = await auth.getSession();
  document.getElementById('loading').style.display='none';
  if(session){
    await enterApp(session);
  } else {
    document.getElementById('login-screen').style.display='flex';
  }
  auth.onAuthStateChange((event, session)=>{
    if(event==='SIGNED_OUT'){
      document.getElementById('app').style.display='none';
      document.getElementById('login-screen').style.display='flex';
    }
  });
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
